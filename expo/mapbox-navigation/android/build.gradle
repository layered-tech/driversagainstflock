plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.rnmapbox'
version = '0.0.0'

def safeExtGet(prop, fallback) {
  if (rootProject.ext.has(prop)) {
    return rootProject.ext.get(prop)
  }

  if (rootProject.hasProperty(prop)) {
    return rootProject.property(prop)
  }

  if (project.hasProperty(prop)) {
    return project.property(prop)
  }

  return fallback
}

android {
  namespace "com.rnmapbox.navigation"

  defaultConfig {
    versionCode 1
    versionName "0.0.0"
    consumerProguardFiles("proguard-rules.pro")
  }
}

dependencies {
  def navigationVersion = safeExtGet("RNMapboxNavigationSdkVersion", "3.24.2")
  def navigationArtifact = safeExtGet("RNMapboxNavigationAndroidArtifact", "android-ndk27")

  implementation "com.facebook.react:react-android"
  implementation "com.mapbox.navigationcore:${navigationArtifact}:${navigationVersion}"
  implementation "com.mapbox.navigationcore:ui-maps-ndk27:${navigationVersion}"
  implementation project(":rnmapbox_maps")
}
