    text: 'true'
- assertVisible:
    id: 'e2e-native-puck-indicator-at-raw'
    text: 'false'
- assertVisible:
    id: 'driving-speed-limit-value'
    text: '35'
- pressKey: Home
- travel:
    points:
      - '30.26698404060037, -97.74414009212921'
      - '30.26698404060037, -97.7389396314831'
    # Maestro 1.40.3 underestimates path distance, so use a lower simulation
    # speed to keep the app backgrounded long enough for a task delivery.
    speed: 1
- extendedWaitUntil:
    visible:
      id: '__e2e-background-settle-delay__'
    timeout: 10000
    optional: true
- launchApp:
    stopApp: false
- extendedWaitUntil:
    visible:
      id: 'e2e-road-matching-edge-id'
      text: 'e2e-main-45:0:forward'
    timeout: 30000
- assertVisible:
