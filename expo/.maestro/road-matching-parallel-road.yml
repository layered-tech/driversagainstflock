appId: com.anonymous.drivefree.dev
name: In-house Road Matching Parallel Roads
tags:
  - map
  - road-matching
---
- setLocation:
    latitude: 30.26760492387431
    longitude: -97.7483004606461
- launchApp:
    clearState: true
    stopApp: true
    permissions:
      all: allow
- runFlow:
    when:
      true: ${typeof MAESTRO_EXPO_DEV_CLIENT_URL !== 'undefined' && MAESTRO_EXPO_DEV_CLIENT_URL.length > 0}
    commands:
      - openLink: ${MAESTRO_EXPO_DEV_CLIENT_URL}
- extendedWaitUntil:
    visible:
      id: 'map-search-input-map'
    timeout: 30000
- openLink: 'driversagainstflock://e2e-mocks'
- extendedWaitUntil:
    visible:
      id: 'start-free-drive-button'
    timeout: 10000
- tapOn:
    id: 'start-free-drive-button'
    retryTapIfNoChange: true
- setLocation:
    latitude: 30.26760492387431
    longitude: -97.7483004606461
- extendedWaitUntil:
    visible:
      id: 'e2e-road-matching-edge-id'
      text: 'e2e-frontage:0:forward'
    timeout: 30000
- runFlow:
    when:
      visible:
        id: 'driving-recenter-button'
    commands:
      - tapOn:
          id: 'driving-recenter-button'
- extendedWaitUntil:
    visible:
      id: 'e2e-native-puck-proof'
      text: 'true'
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: 'e2e-native-3d-puck-proof'
      text: 'true'
    timeout: 30000
- assertVisible:
    id: 'e2e-native-puck-kind'
    text: '3d'
- assertVisible:
    id: 'e2e-native-puck-model-uri'
    text: 'asset://navigation_puck.glb'
- assertVisible:
    id: 'e2e-native-puck-model-scale'
    text: '75,75,75'
- assertVisible:
