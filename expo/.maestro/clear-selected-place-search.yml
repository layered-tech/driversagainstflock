appId: com.anonymous.drivefree.dev
name: Clear Selected Place Search Mocked
tags:
  - map
  - search
---
- setLocation:
    latitude: 30.2672
    longitude: -97.7431
- launchApp:
    stopApp: true
    permissions:
      all: allow
- runFlow:
    when:
      true: ${typeof MAESTRO_EXPO_DEV_CLIENT_URL !== 'undefined' && MAESTRO_EXPO_DEV_CLIENT_URL.length > 0}
    commands:
      - openLink: ${MAESTRO_EXPO_DEV_CLIENT_URL}
- extendedWaitUntil:
    visible:
      id: "map-search-input-map"
    timeout: 30000
- openLink: "driversagainstflock://e2e-mocks"
- extendedWaitUntil:
    visible:
      id: "map-search-input-map"
    timeout: 10000

- tapOn:
    id: "map-search-input-map"
- inputText: "Austin Central Library"
- extendedWaitUntil:
    visible:
      id: "map-search-result-0-map"
    timeout: 30000
- tapOn:
    id: "map-search-result-0-map"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "selected-place-title"
    timeout: 30000
- assertVisible:
    text: "Austin Central Library"
- extendedWaitUntil:
    visible:
      id: "place-details-close-button"
    timeout: 10000
- tapOn:
    id: "place-details-close-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "map-search-directions-button-map"
    timeout: 10000
- assertVisible:
    id: "map-search-directions-button-map"
