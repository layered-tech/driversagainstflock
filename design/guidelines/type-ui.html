<!-- @dsCard group="Type" viewport="700x250" name="UI & body — Hanken Grotesk" subtitle="Every interface label, paragraph & control" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-card);padding:22px;color:var(--text-ink)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-ink-faint);margin:0 0 12px}
  .row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--border-light)}
  .row .tok{font-family:var(--font-mono);font-size:10px;color:var(--text-ink-faint);width:130px;flex:0 0 auto}
  .h3{font-size:21px;font-weight:700;letter-spacing:-.012em}
  .title{font-size:18px;font-weight:600}
  .body{font-size:15px;font-weight:400}
  .sm{font-size:13px;font-weight:500;color:var(--text-ink-soft)}
  .lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-ink-soft)}
</style></head><body>
<p class="meta">var(--font-ui) · 300–800</p>
<div class="row"><span class="tok">h3 / 21·700</span><span class="h3">Choose your route</span></div>
<div class="row"><span class="tok">title / 18·600</span><span class="title">Avoid monitored roads</span></div>
<div class="row"><span class="tok">body / 15·400</span><span class="body">Two routes found. One skips every camera we know about.</span></div>
<div class="row"><span class="tok">body-sm / 13·500</span><span class="sm">12.4 mi · arrive 6:12</span></div>
<div class="row" style="border:none"><span class="tok">label / 11·700</span><span class="lab">Monitored node</span></div>
</body></html>
