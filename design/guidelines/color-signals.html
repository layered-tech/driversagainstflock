<!-- @dsCard group="Colors" viewport="700x160" name="Functional signals" subtitle="Azure (fast) · Alert (cameras) · Amber (monitored) · Violet (destination)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-card);padding:20px;color:var(--text-ink)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .col h4{margin:0 0 8px;font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-ink-soft)}
  .col .role{font-size:11px;color:var(--text-ink-faint);margin:0 0 8px}
  .sw{height:48px;border-radius:var(--radius-sm);display:flex;align-items:flex-end;padding:7px;color:#fff;font-family:var(--font-mono);font-size:10px}
  h3{margin:0 0 14px;font-family:var(--font-display);font-size:15px}
</style></head><body>
<h3>Functional signals</h3>
<div class="grid">
  <div class="col"><h4>Azure</h4><p class="role">Fastest route</p><div class="sw" style="background:#2E8BFF">#2E8BFF</div></div>
  <div class="col"><h4>Alert</h4><p class="role">Cameras / ALPR</p><div class="sw" style="background:#FF4D4F">#FF4D4F</div></div>
  <div class="col"><h4>Amber</h4><p class="role">Monitored / caution</p><div class="sw" style="background:#FFB02E;color:#0B0E12">#FFB02E</div></div>
  <div class="col"><h4>Violet</h4><p class="role">Destination</p><div class="sw" style="background:#7A5CFF">#7A5CFF</div></div>
</div>
</body></html>
