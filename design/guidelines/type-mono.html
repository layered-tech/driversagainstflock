<!-- @dsCard group="Type" viewport="700x210" name="Data & badges — JetBrains Mono" subtitle="Speed, ETA, distance, coordinates, node IDs" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-card);padding:22px;color:var(--text-primary)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin:0 0 14px}
  .row{display:flex;align-items:flex-start;gap:26px;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;gap:3px}
  .cell .v{font-family:var(--font-mono);font-weight:700;color:var(--text-primary);font-feature-settings:"tnum" 1;white-space:nowrap}
  .cell .k{font-family:var(--font-ui);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary)}
  .big{font-size:34px} .mid{font-size:22px} .sm{font-size:14px}
</style></head><body>
<p class="meta">var(--font-mono) · tabular figures</p>
<div class="row">
  <div class="cell"><span class="v big">38</span><span class="k">mph now</span></div>
  <div class="cell"><span class="v big">27</span><span class="k">min eta</span></div>
  <div class="cell"><span class="v mid">13.1 mi</span><span class="k">distance</span></div>
  <div class="cell"><span class="v sm">37.7749, −122.4194</span><span class="k">coordinates</span></div>
  <div class="cell"><span class="v sm">NODE-4471-A</span><span class="k">monitored id</span></div>
</div>
</body></html>
