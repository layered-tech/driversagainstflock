<!-- @dsCard group="Brand" viewport="700x330" name="Map legend" subtitle="What every marker means at a glance" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--map-land-alt);padding:24px;color:var(--text-primary)}
  .legend{display:grid;grid-template-columns:1fr 1fr;gap:12px 30px;background:var(--surface-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);border:0.5px solid var(--border);padding:18px 22px}
  .item{display:flex;align-items:center;gap:14px}
  .item .g{width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;position:relative}
  .item .lab{font-size:13px;font-weight:500}
  .dot{border-radius:50%;border:1.5px solid var(--surface-card);box-shadow:0 1px 4px rgba(0,0,0,.3)}
  h3{margin:0 0 14px;font-family:var(--font-display);font-size:15px}
  /* camera cone: faded wedge with a small dot at the apex */
  .cone{position:absolute;left:50%;top:52%;width:38px;height:30px;transform:translate(-50%,-10%);
    background:rgba(255,77,79,.32);
    clip-path:polygon(50% 0,100% 100%,0 100%)}
  .alpr{width:11px;height:11px;background:#FF4D4F;position:relative;z-index:1}
  .pbadge{width:19px;height:19px;border-radius:50%;background:#2E8BFF;border:1.5px solid var(--surface-card);box-shadow:0 1px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff}
  .pbadge.hid{background:var(--surface-card);border:1.5px dashed #2E8BFF;color:#2E8BFF;box-shadow:none}
  .note{grid-column:1 / -1;margin:2px 0 0;font-size:11px;color:var(--text-tertiary)}
  .pin{width:0;height:0}
</style></head><body>
<h3>Map legend</h3>
<div class="legend">
  <div class="item"><span class="g"><span class="dot" style="width:14px;height:14px;background:#1FBF6B"></span></span><span class="lab">Your location</span></div>
  <div class="item"><span class="g"><span class="dot alpr"></span></span><span class="lab">ALPR camera</span></div>
  <div class="item"><span class="g"><span class="cone"></span><span class="dot alpr" style="margin-top:-4px"></span></span><span class="lab">Camera + cone of view</span></div>
  <div class="item"><span class="g"><span class="dot" style="width:18px;height:18px;background:#FF4D4F;font-family:var(--font-mono);font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;border-width:1px">6</span></span><span class="lab">Camera cluster</span></div>
  <div class="item"><span class="g"><span class="pbadge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path></svg></span></span><span class="lab">Police reported</span></div>
  <div class="item"><span class="g"><span class="pbadge hid"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path></svg></span></span><span class="lab">Hidden police</span></div>
  <div class="item"><span class="g"><span class="dot" style="width:16px;height:16px;background:#2A323C"></span></span><span class="lab">Saved place</span></div>
  <div class="item"><span class="g"><span class="dot" style="width:16px;height:16px;background:#7A5CFF"></span></span><span class="lab">Destination</span></div>
  <div class="item"><span class="g"><span class="dot" style="width:14px;height:14px;background:var(--surface-card);border-color:#FFB02E"></span></span><span class="lab">Monitored node</span></div>
  <p class="note">Police and hidden-police markers are live driver reports retrieved from Waze.</p>
</div>
</body></html>
