<!-- @dsCard group="Colors" viewport="700x180" name="Ink neutrals" subtitle="Warm-cool charcoal scale — surfaces & text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-card);padding:20px;color:var(--text-ink)}
  .ramp{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-light)}
  .sw{height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .sw b{font-family:var(--font-mono);font-size:11px;font-weight:600}
  .sw small{font-family:var(--font-mono);font-size:9px;opacity:.7}
  h3{margin:0 0 12px;font-family:var(--font-display);font-size:15px}
  .note{margin-top:10px;font-size:12px;color:var(--text-ink-soft)}
</style></head><body>
<h3>Ink — neutral scale</h3>
<div class="ramp" id="r1"></div>
<div class="ramp" id="r2" style="margin-top:8px"></div>
<p class="note">Ink neutrals feed the semantic surfaces & text. In light, glass = white @ 80% + blur and text = ink; in dark, glass = ink @ 82% and text = near-white. Reference <code style="font-family:var(--font-mono)">--surface-*</code> / <code style="font-family:var(--font-mono)">--text-*</code>, never the ramp.</p>
<script>
const a=[['950','#0B0E12'],['900','#11151B'],['800','#1A2027'],['700','#262E37'],['600','#3A434E'],['500','#5A6573'],['400','#828D9B']];
const b=[['300','#A9B2BD'],['200','#CFD5DC'],['100','#E7EAEE'],['075','#EFF2F5'],['050','#F5F7F9'],['white','#FFFFFF'],['—','transparent']];
const cell=([k,v],dark)=>`<div class="sw" style="background:${v};color:${dark?'#fff':'#0B0E12'};${v==='transparent'?'background-image:linear-gradient(45deg,#eee 25%,transparent 25%,transparent 75%,#eee 75%),linear-gradient(45deg,#eee 25%,#fff 25%,#fff 75%,#eee 75%);background-size:12px 12px;background-position:0 0,6px 6px;':''}${v==='#FFFFFF'?'border-right:1px solid #eee':''}"><b>${k}</b><small>${v==='transparent'?'':v}</small></div>`;
document.getElementById('r1').innerHTML=a.map(x=>cell(x,parseInt(x[0])<=600||x[0]==='950')).join('');
document.getElementById('r2').innerHTML=b.map(x=>cell(x,false)).join('');
</script>
</body></html>
