<!-- @dsCard group="Brand" viewport="700x230" name="Logo" subtitle="The route mark — fastest & private paths around a place" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-card);padding:0;color:var(--text-ink);display:flex}
  .a,.b{flex:1;display:flex;align-items:center;gap:18px;padding:26px}
  .b{background:var(--surface-inverse)}
  img{width:96px;height:96px;border-radius:var(--radius-lg);box-shadow:var(--shadow-card)}
  .wm{display:flex;flex-direction:column}
  .wm .n{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-.02em;line-height:1}
  .wm .n.dark{color:var(--text-inverse)}
  .wm .t{font-family:var(--font-ui);font-size:12px;color:var(--text-ink-faint);margin-top:5px;max-width:24ch}
  .wm .t.d{color:var(--text-inverse);opacity:.62}
</style></head><body>
<div class="a">
  <img src="../assets/logo-mark.png" alt="DAF logo" />
  <div class="wm"><span class="n">Drivers<br>Against Flock</span><span class="t">On light surfaces</span></div>
</div>
<div class="b">
  <img src="../assets/logo-mark.png" alt="DAF logo" />
  <div class="wm"><span class="n dark">Drivers<br>Against Flock</span><span class="t d">On ink / over map</span></div>
</div>
</body></html>
