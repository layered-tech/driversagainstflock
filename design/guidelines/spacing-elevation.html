<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Soft, neutral shadows — float, card, sheet, marker" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--map-land);padding:30px;color:var(--text-ink);display:flex;gap:26px;flex-wrap:wrap}
  .e{width:150px;height:96px;border-radius:var(--radius-lg);background:var(--surface-card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
  .e .n{font-family:var(--font-display);font-weight:700;font-size:14px}
  .e .t{font-family:var(--font-mono);font-size:10px;color:var(--text-ink-faint)}
</style></head><body>
  <div class="e" style="box-shadow:var(--shadow-card)"><span class="n">Card</span><span class="t">--shadow-card</span></div>
  <div class="e" style="box-shadow:var(--shadow-float)"><span class="n">Float</span><span class="t">--shadow-float</span></div>
  <div class="e" style="box-shadow:var(--shadow-sheet)"><span class="n">Sheet</span><span class="t">--shadow-sheet</span></div>
  <div class="e" style="box-shadow:var(--shadow-marker);background:var(--surface-sheet);color:var(--text-primary)"><span class="n">Marker</span><span class="t" style="color:var(--text-tertiary)">--shadow-marker</span></div>
</body></html>
