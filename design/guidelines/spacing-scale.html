<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-card);padding:22px;color:var(--text-ink)}
  h3{margin:0 0 14px;font-family:var(--font-display);font-size:15px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .row .tok{font-family:var(--font-mono);font-size:11px;width:140px;color:var(--text-ink-soft)}
  .bar{height:14px;background:var(--brand);border-radius:3px}
</style></head><body>
<h3>Spacing — 4px base</h3>
<div id="r"></div>
<script>
const s=[['--space-1',4],['--space-2',8],['--space-3',12],['--space-4',16],['--space-5',20],['--space-6',24],['--space-7',32],['--space-8',40],['--space-9',48],['--space-10',64]];
document.getElementById('r').innerHTML=s.map(([t,v])=>`<div class="row"><span class="tok">${t} · ${v}px</span><span class="bar" style="width:${v}px"></span></div>`).join('');
</script>
</body></html>
