<!-- @dsCard group="Brand" viewport="700x240" name="Route language" subtitle="Fastest vs Private — solid azure vs solid green, told apart by icon + label" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--map-land);padding:24px;color:var(--text-ink)}
  .card{background:var(--surface-glass);backdrop-filter:blur(var(--blur-glass));border:1px solid var(--border-glass);border-radius:var(--radius-lg);box-shadow:var(--shadow-float);padding:18px;color:var(--text-primary)}
  .opt{display:flex;align-items:center;gap:14px;padding:10px 0}
  .opt+.opt{border-top:1px solid var(--border-glass)}
  .ico{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto}
  .name{font-weight:700;font-size:15px}
  .desc{font-size:12px;color:var(--text-secondary);margin-top:2px}
  svg{flex:0 0 auto}
</style></head><body>
<div class="card">
  <div class="opt">
    <span class="ico" style="background:rgba(46,139,255,.16);color:#2E8BFF">⚡</span>
    <svg width="70" height="14"><line x1="3" y1="7" x2="67" y2="7" stroke="#fff" stroke-width="11" stroke-linecap="round"/><line x1="3" y1="7" x2="67" y2="7" stroke="#2E8BFF" stroke-width="7" stroke-linecap="round"/></svg>
    <div><div class="name">Fastest route</div><div class="desc">Solid azure · bolt — gets you there quickest</div></div>
  </div>
  <div class="opt">
    <span class="ico" style="background:rgba(31,191,107,.16);color:#1FBF6B">⛨</span>
    <svg width="70" height="14"><line x1="3" y1="7" x2="67" y2="7" stroke="#fff" stroke-width="11" stroke-linecap="round"/><line x1="3" y1="7" x2="67" y2="7" stroke="#1FBF6B" stroke-width="7" stroke-linecap="round"/></svg>
    <div><div class="name">Private route</div><div class="desc">Solid green · shield — skips the cameras</div></div>
  </div>
</div>
</body></html>
