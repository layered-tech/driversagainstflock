<!-- @dsCard group="Spacing" viewport="700x300" name="Radii & touch targets" subtitle="A visible ladder — each radius maps to a role" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--surface-page);padding:24px;color:var(--text-primary)}
  .eyebrow{font-size:var(--fs-label);font-weight:var(--fw-bold);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-tertiary);margin:0 0 12px}
  .ladder{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:22px}
  .r{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:100%;aspect-ratio:1;background:var(--brand-soft);border:2px solid var(--brand);
       position:relative}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);font-weight:600}
  .role{font-size:10px;color:var(--text-tertiary);text-align:center;line-height:1.2}
  .hits{display:flex;gap:14px;align-items:center}
  .hit{display:flex;flex-direction:column;align-items:center;gap:7px}
  .t{border-radius:var(--radius-pill);background:var(--brand);color:var(--brand-contrast);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:var(--font-mono)}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)}
</style></head><body>
<p class="eyebrow">Corner radii — role-mapped</p>
<div class="ladder">
  <div class="r"><div class="box" style="border-radius:6px"></div><span class="tok">xs · 6</span><span class="role">tags · swatches</span></div>
  <div class="r"><div class="box" style="border-radius:10px"></div><span class="tok">sm · 10</span><span class="role">inputs · tiles</span></div>
  <div class="r"><div class="box" style="border-radius:14px"></div><span class="tok">md · 14</span><span class="role">route cards · rows</span></div>
  <div class="r"><div class="box" style="border-radius:18px"></div><span class="tok">lg · 18</span><span class="role">default card</span></div>
  <div class="r"><div class="box" style="border-radius:24px"></div><span class="tok">xl · 24</span><span class="role">hero panels</span></div>
  <div class="r"><div class="box" style="border-radius:32px"></div><span class="tok">2xl · 32</span><span class="role">modal shells</span></div>
  <div class="r"><div class="box" style="border-radius:999px"></div><span class="tok">pill</span><span class="role">buttons · search</span></div>
</div>
<p class="eyebrow">Touch targets — 44px floor for driving</p>
<div class="hits">
  <div class="hit"><div class="t" style="width:44px;height:44px">44</div><span class="cap">min</span></div>
  <div class="hit"><div class="t" style="width:46px;height:46px">46</div><span class="cap">comfy</span></div>
  <div class="hit"><div class="t" style="width:52px;height:52px">52</div><span class="cap">large</span></div>
</div>
</body></html>
