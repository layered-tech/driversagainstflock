<!-- @dsCard group="Components" viewport="700x440" name="RouteCard" subtitle="Fastest vs Private route options — light/dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui); color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 26px; transition: background var(--dur-base) var(--ease-standard);
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 20; }
  .tg { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-pill);
        background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);
        box-shadow: var(--shadow-float); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: var(--font-ui); font-weight: 600; font-size: 12px; cursor: pointer; }
  .wrap { display: flex; flex-direction: column; gap: 10px; max-width: 520px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { RouteCard, Slider, Button, Icon } = NS;
function ThemeToggle() {
  const [t, setT] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', t); }, [t]);
  return <div className="toolbar"><button className="tg" onClick={() => setT(t === 'light' ? 'dark' : 'light')}><Icon name={t === 'light' ? 'moon' : 'sun'} size={15} />{t === 'light' ? 'Dark' : 'Light'}</button></div>;
}
function Demo() {
  const [route, setRoute] = React.useState('private');
  const [buffer, setBuffer] = React.useState(250);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  return (
    <>
      <ThemeToggle />
      <RouteCard kind="private" eta="27 min" arrival="arrive 6:15" distance="13.1 mi" cameras={0} recommended selected={route==='private'} onClick={()=>setRoute('private')} />
      <RouteCard kind="fast" eta="24 min" arrival="arrive 6:12" distance="12.4 mi" cameras={4} selected={route==='fast'} onClick={()=>setRoute('fast')} />
      <div style={{ marginTop: 8, paddingTop: 16, borderTop: '1px solid var(--border-glass)' }}>
        <button onClick={() => setSettingsOpen(o => !o)} aria-expanded={settingsOpen}
          style={{ display: 'flex', alignItems: 'center', gap: 9, width: '100%', padding: '4px 2px', border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--text-secondary)', fontFamily: 'var(--font-ui)', fontSize: 'var(--fs-body-sm)', fontWeight: 'var(--fw-semibold)' }}>
          <Icon name="sliders" size={16} />
          <span>Settings</span>
          <span style={{ flex: 1 }} />
          <span style={{ display: 'inline-flex', color: 'var(--text-tertiary)', transition: 'transform var(--dur-base) var(--ease-standard)', transform: settingsOpen ? 'rotate(180deg)' : 'none' }}><Icon name="chevron-down" size={16} /></span>
        </button>
        {settingsOpen && (
          <div style={{ marginTop: 14 }}>
            <Slider label="Avoid cameras by" showValue min={0} max={1000} step={50} value={buffer} onChange={setBuffer} formatValue={(v) => `${v.toLocaleString()} ft`} />
          </div>
        )}
      </div>
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 12 }}>
        <Button variant="ghost" size="md">Cancel</Button>
        <Button variant="primary" size="md">View Route</Button>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
