<!-- @dsCard group="Components" viewport="760x420" name="SpeedLimitBadge" subtitle="Posted limit + bottom-corner live speed — gray under, black over" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui); color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 30px; transition: background var(--dur-base) var(--ease-standard);
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 20; }
  .tg { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-pill);
        background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);
        box-shadow: var(--shadow-float); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: var(--font-ui); font-weight: 600; font-size: 12px; cursor: pointer; }
  .stack { display: flex; flex-direction: column; gap: 46px; }
  .row { display: flex; align-items: flex-end; gap: 44px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }
  .cap { margin-top: 16px; font-size: 12px; color: var(--text-secondary); text-align: center; }
  .cell { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<div class="stack" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { SpeedLimitBadge, Icon } = NS;
function ThemeToggle() {
  const [t, setT] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', t); }, [t]);
  return <div className="toolbar"><button className="tg" onClick={() => setT(t === 'light' ? 'dark' : 'light')}><Icon name={t === 'light' ? 'moon' : 'sun'} size={15} />{t === 'light' ? 'Dark' : 'Light'}</button></div>;
}
function Demo() {
  return (
    <>
      <ThemeToggle />
      <div>
        <div className="lbl">States</div>
        <div className="row">
          <div className="cell"><SpeedLimitBadge limit={35} size={72} /><div className="cap">Posted only</div></div>
          <div className="cell"><SpeedLimitBadge limit={35} current={32} size={72} /><div className="cap">At / under — gray</div></div>
          <div className="cell"><SpeedLimitBadge limit={35} current={41} size={72} /><div className="cap">Over — black</div></div>
        </div>
      </div>
      <div>
        <div className="lbl">Sizes</div>
        <div className="row">
          <div className="cell"><SpeedLimitBadge limit={35} current={41} size="sm" /><div className="cap">sm · 44</div></div>
          <div className="cell"><SpeedLimitBadge limit={35} current={41} size="md" /><div className="cap">md · 58</div></div>
          <div className="cell"><SpeedLimitBadge limit={35} current={41} size="lg" /><div className="cap">lg · 80</div></div>
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
