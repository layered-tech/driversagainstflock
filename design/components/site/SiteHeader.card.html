<!-- @dsCard group="Components" viewport="1200x420" name="Site header" subtitle="Shared top nav — marketing (glass) & app (opaque) chrome" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui);
    color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 28px;
  }
  .wrap { display: flex; flex-direction: column; gap: 26px; }
  .eyebrow { font-size: var(--fs-label); font-weight: var(--fw-bold); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-tertiary); margin: 0 0 9px; }
  .frame { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { SiteHeader } = NS;

const landingLinks = [
  { label: 'Map Preview', href: '#preview' },
  { label: 'John Doe', href: '#johndoe' },
  { label: 'How it works', href: '#how' },
  { label: 'Android Auto', href: '#android-auto' },
  { label: 'Apps', href: '#apps' },
];
const appLinks = [
  { label: 'Map Preview', href: '#preview' },
  { label: 'John Doe', href: '#johndoe' },
  { label: 'How it works', href: '#how' },
  { label: 'Android Auto', href: '#android-auto' },
  { label: 'Apps', href: '#apps' },
];

function Demo() {
  return (
    <div className="wrap">
      <div>
        <p className="eyebrow">Marketing — glass, sticky, with CTA</p>
        <div className="frame">
          <SiteHeader variant="marketing" links={landingLinks} cta={{ label: 'Open Full Map', href: '#' }} />
        </div>
      </div>
      <div>
        <p className="eyebrow">App — opaque, drop shadow, no CTA</p>
        <div className="frame">
          <SiteHeader variant="app" logoHref="#" links={appLinks} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
