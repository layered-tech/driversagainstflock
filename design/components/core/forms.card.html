<!-- @dsCard group="Components" viewport="700x760" name="Form controls" subtitle="Slider · Checkbox · RadioGroup · Combobox — light/dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui);
    color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 26px;
    transition: background var(--dur-base) var(--ease-standard);
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 90; }
  .tg { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-pill);
        background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);
        box-shadow: var(--shadow-float); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: var(--font-ui); font-weight: 600; font-size: 12px; cursor: pointer; }
  .wrap { display: flex; flex-direction: column; gap: 24px; max-width: 648px; }
  .eyebrow { font-size: var(--fs-label); font-weight: var(--fw-bold); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-tertiary); margin: 0 0 12px; }
  .sect { display: flex; flex-direction: column; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: 20px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { Slider, Checkbox, RadioGroup, Combobox, Icon } = NS;

function ThemeToggle() {
  const [t, setT] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', t); }, [t]);
  return (
    <div className="toolbar">
      <button className="tg" onClick={() => setT(t === 'light' ? 'dark' : 'light')}>
        <Icon name={t === 'light' ? 'moon' : 'sun'} size={15} />{t === 'light' ? 'Dark' : 'Light'}
      </button>
    </div>
  );
}

function Sect({ label, children }) {
  return <div className="sect"><p className="eyebrow">{label}</p>{children}</div>;
}

const PLACES = [
  { value: 'home', label: 'Home',  sublabel: '1100 Mission St, San Francisco', icon: 'home',      meta: '4.2 mi' },
  { value: 'work', label: 'Work',  sublabel: '500 Howard St, San Francisco',   icon: 'briefcase', meta: '6.1 mi' },
  { value: 'sfo',  label: 'SFO International Airport', sublabel: 'San Bruno, CA', icon: 'map-pin', meta: '13 mi' },
  { value: 'gg',   label: 'Golden Gate Park', sublabel: 'San Francisco, CA',   icon: 'map-pin',   meta: '5.0 mi' },
  { value: 'bb',   label: 'Blue Bottle Coffee', sublabel: 'Recent',            icon: 'clock' },
  { value: 'fav',  label: 'Tartine Bakery', sublabel: 'Saved',                 icon: 'star',      meta: '2.3 mi' },
];

function Demo() {
  const [radius, setRadius] = React.useState(8);
  const [vol, setVol] = React.useState(70);
  const [tolls, setTolls] = React.useState(false);
  const [hwy, setHwy] = React.useState(true);
  const [allFilters] = React.useState(true);
  const [pref, setPref] = React.useState('private');
  const [units, setUnits] = React.useState('mi');

  return (
    <>
      <ThemeToggle />

      <Sect label="Combobox · destination autocomplete">
        <Combobox
          placeholder="Where to?"
          options={PLACES}
          onSelect={() => {}}
        />
      </Sect>

      <Sect label="Slider">
        <div className="panel stack">
          <Slider value={radius} min={1} max={50} step={1} onChange={setRadius}
            label="Search radius" showValue formatValue={(v) => `${v} mi`} />
          <Slider value={vol} min={0} max={100} step={5} onChange={setVol}
            label="Voice volume" showValue formatValue={(v) => `${v}%`} />
          <Slider defaultValue={30} disabled label="Disabled" showValue />
        </div>
      </Sect>

      <div className="cols">
        <Sect label="Checkbox">
          <div className="panel stack">
            <Checkbox checked={tolls} onChange={setTolls} label="Avoid tolls" />
            <Checkbox checked={hwy} onChange={setHwy} label="Avoid highways"
              description="Adds about 6 min on this route" />
            <Checkbox indeterminate={allFilters} label="All map filters" />
            <Checkbox checked disabled label="Locked setting" />
          </div>
        </Sect>

        <Sect label="RadioGroup">
          <div className="panel stack">
            <RadioGroup
              value={pref}
              onChange={setPref}
              options={[
                { value: 'fast',    label: 'Fastest',  description: 'Lowest ETA' },
                { value: 'private', label: 'Private',  description: 'Avoids monitored roads' },
                { value: 'eco',     label: 'Eco',      description: 'Fewer stops & idling' },
              ]}
            />
            <div style={{ height: 1, background: 'var(--border-light)' }} />
            <RadioGroup orientation="horizontal" value={units} onChange={setUnits}
              options={[{ value: 'mi', label: 'Miles' }, { value: 'km', label: 'Kilometers' }]} />
          </div>
        </Sect>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
