<!-- @dsCard group="Components" viewport="700x520" name="Dialog & AlertDialog" subtitle="Modal dialog & destructive confirm — light/dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui);
    color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 26px;
    transition: background var(--dur-base) var(--ease-standard);
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 90; }
  .tg { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-pill);
        background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);
        box-shadow: var(--shadow-float); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: var(--font-ui); font-weight: 600; font-size: 12px; cursor: pointer; }
  .wrap { display: flex; flex-direction: column; gap: 24px; max-width: 648px; }
  .eyebrow { font-size: var(--fs-label); font-weight: var(--fw-bold); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-tertiary); margin: 0 0 12px; }
  .sect { display: flex; flex-direction: column; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .note { color: var(--text-secondary); font-size: 13px; margin: 10px 0 0; max-width: 520px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { Dialog, AlertDialog, Button, Icon } = NS;

function ThemeToggle() {
  const [t, setT] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', t); }, [t]);
  return (
    <div className="toolbar">
      <button className="tg" onClick={() => setT(t === 'light' ? 'dark' : 'light')}>
        <Icon name={t === 'light' ? 'moon' : 'sun'} size={15} />{t === 'light' ? 'Dark' : 'Light'}
      </button>
    </div>
  );
}

function Sect({ label, children }) {
  return <div className="sect"><p className="eyebrow">{label}</p>{children}</div>;
}

function Demo() {
  const [dialog, setDialog] = React.useState(true);
  const [ending, setEnding] = React.useState(false);
  return (
    <>
      <ThemeToggle />

      <Sect label="Dialog · brand confirm">
        <div className="row">
          <Button variant="primary" onClick={() => setDialog(true)}>Open dialog</Button>
        </div>
        <p className="note">Centered modal with a tinted icon, title, description and a right-aligned footer. Use for opt-in choices that change routing or privacy.</p>
      </Sect>

      <Sect label="AlertDialog · destructive">
        <div className="row">
          <Button variant="danger" leadingIcon={<Icon name="x" size={18} />} onClick={() => setEnding(true)}>End drive…</Button>
        </div>
        <p className="note">A focused confirm for irreversible actions — the confirm button carries the danger tone.</p>
      </Sect>

      <Dialog
        open={dialog}
        onClose={() => setDialog(false)}
        icon="shield-check"
        tone="brand"
        title="Switch to the Private route?"
        description="This avoids 3 monitored roads and 2 camera clusters. It adds about 4 minutes to your ETA."
        footer={
          <>
            <Button variant="ghost" onClick={() => setDialog(false)}>Not now</Button>
            <Button variant="primary" onClick={() => setDialog(false)}>Use Private</Button>
          </>
        }
      />

      <AlertDialog
        open={ending}
        destructive
        title="End this drive?"
        description="You'll lose turn-by-turn guidance to SFO International Airport."
        confirmLabel="End drive"
        cancelLabel="Keep driving"
        onCancel={() => setEnding(false)}
        onConfirm={() => setEnding(false)}
      />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
