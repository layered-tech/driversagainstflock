<!-- @dsCard group="Components" viewport="700x270" name="Button" subtitle="Primary, secondary, ghost & danger — sizes, icons, disabled — light/dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui);
    color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 18px 20px;
    transition: background var(--dur-base) var(--ease-standard);
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 20; }
  .tg { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-pill);
        background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);
        box-shadow: var(--shadow-float); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: var(--font-ui); font-weight: 600; font-size: 12px; cursor: pointer; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; align-content: start; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .eyebrow { font-size: var(--fs-label); font-weight: var(--fw-bold); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-tertiary); margin: 0 0 6px; }
  .sect { display: flex; flex-direction: column; }
  .span2 { grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { Button, Icon } = NS;

function ThemeToggle() {
  const [t, setT] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', t); }, [t]);
  return (
    <div className="toolbar">
      <button className="tg" onClick={() => setT(t === 'light' ? 'dark' : 'light')}>
        <Icon name={t === 'light' ? 'moon' : 'sun'} size={15} />{t === 'light' ? 'Dark' : 'Light'}
      </button>
    </div>
  );
}

function Sect({ label, span, children }) {
  return <div className={span ? "sect span2" : "sect"}><p className="eyebrow">{label}</p><div className="row">{children}</div></div>;
}

function Demo() {
  return (
    <>
      <ThemeToggle />
      <Sect label="Variants" span>
        <Button variant="primary" leadingIcon={<Icon name="navigation-2" size={18} />}>Start drive</Button>
        <Button variant="secondary" leadingIcon={<Icon name="rotate-cw" size={18} />}>Re-route</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="danger" leadingIcon={<Icon name="x" size={18} />}>End</Button>
      </Sect>
      <Sect label="Sizes">
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg">Large</Button>
      </Sect>
      <Sect label="With trailing icon">
        <Button variant="primary" trailingIcon={<Icon name="arrow-right" size={18} />}>Continue</Button>
        <Button variant="secondary" trailingIcon={<Icon name="chevron-down" size={18} />}>Options</Button>
      </Sect>
      <Sect label="Full width">
        <Button variant="primary" fullWidth leadingIcon={<Icon name="navigation-2" size={18} />}>Start drive</Button>
      </Sect>
      <Sect label="Disabled">
        <Button variant="primary" disabled>Primary</Button>
        <Button variant="secondary" disabled>Secondary</Button>
        <Button variant="danger" disabled>Danger</Button>
      </Sect>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
