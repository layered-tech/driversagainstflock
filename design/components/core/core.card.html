<!-- @dsCard group="Components" viewport="700x1080" name="Core controls" subtitle="Buttons, inputs, toggles, badges, chips & cards — light/dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    font-family: var(--font-ui);
    color: var(--text-primary);
    background:
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(128,141,155,0.10) 38px 39px),
      var(--map-land);
    padding: 26px;
    transition: background var(--dur-base) var(--ease-standard);
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 20; }
  .tg { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-pill);
        background: var(--surface-glass); color: var(--text-primary); border: 1px solid var(--border-glass);
        box-shadow: var(--shadow-float); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: var(--font-ui); font-weight: 600; font-size: 12px; cursor: pointer; }
  .wrap { display: flex; flex-direction: column; gap: 18px; max-width: 648px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .eyebrow { font-size: var(--fs-label); font-weight: var(--fw-bold); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-tertiary); margin: 0 0 2px; }
  .sect { display: flex; flex-direction: column; gap: 9px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.DesignSystem_aa8750;
const { Button, ButtonGroup, IconButton, Input, Switch, Badge, Chip, Card, SegmentedControl, Icon } = NS;

function ThemeToggle() {
  const [t, setT] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', t); }, [t]);
  return (
    <div className="toolbar">
      <button className="tg" onClick={() => setT(t === 'light' ? 'dark' : 'light')}>
        <Icon name={t === 'light' ? 'moon' : 'sun'} size={15} />{t === 'light' ? 'Dark' : 'Light'}
      </button>
    </div>
  );
}

function Sect({ label, children }) {
  return <div className="sect"><p className="eyebrow">{label}</p><div className="row">{children}</div></div>;
}

function Demo() {
  const [mode, setMode] = React.useState('fast');
  const [on, setOn] = React.useState(true);
  const [sel, setSel] = React.useState(true);
  return (
    <>
      <ThemeToggle />
      <Sect label="Buttons">
        <Button variant="primary" leadingIcon={<Icon name="navigation-2" size={18} />}>Start drive</Button>
        <Button variant="secondary" leadingIcon={<Icon name="rotate-cw" size={18} />}>Re-route</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="danger" leadingIcon={<Icon name="x" size={18} />}>End</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </Sect>
      <Sect label="Button sizes">
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg">Large</Button>
      </Sect>
      <Sect label="Grouped buttons · horizontal">
        <ButtonGroup>
          <Button variant="secondary" leadingIcon={<Icon name="zap" size={16} />}>Fastest</Button>
          <Button variant="secondary" leadingIcon={<Icon name="shield-check" size={16} />}>Private</Button>
          <Button variant="secondary">Eco</Button>
        </ButtonGroup>
        <ButtonGroup size="sm">
          <Button variant="secondary"><Icon name="minus" size={16} /></Button>
          <Button variant="secondary">Stops</Button>
          <Button variant="secondary"><Icon name="plus" size={16} /></Button>
        </ButtonGroup>
      </Sect>
      <Sect label="Grouped buttons · vertical">
        <div style={{width: 220}}>
          <ButtonGroup orientation="vertical" fullWidth>
            <Button variant="secondary" leadingIcon={<Icon name="plus" size={18} />}>Add stop</Button>
            <Button variant="secondary" leadingIcon={<Icon name="share-2" size={18} />}>Share ETA</Button>
            <Button variant="danger" leadingIcon={<Icon name="x" size={18} />}>End drive</Button>
          </ButtonGroup>
        </div>
      </Sect>
      <Sect label="Icon buttons (glass · solid · brand · active)">
        <IconButton label="Recenter" variant="glass"><Icon name="navigation" size={20} /></IconButton>
        <IconButton label="Layers" variant="solid"><Icon name="layers" size={20} /></IconButton>
        <IconButton label="Report" variant="brand"><Icon name="plus" size={22} /></IconButton>
        <IconButton label="Cameras" variant="glass" active><Icon name="scan-eye" size={20} /></IconButton>
        <IconButton label="Mute" variant="glass"><Icon name="volume-2" size={20} /></IconButton>
      </Sect>
      <Sect label="Inputs (sm radius · glass + solid)">
        <div style={{width: 280}}><Input tone="glass" placeholder="Search saved places" leadingIcon={<Icon name="search" size={18} />} /></div>
        <div style={{width: 280}}><Input tone="light" placeholder="Email address" /></div>
      </Sect>
      <Sect label="Segmented control · Switch">
        <div style={{width: 240}}>
          <SegmentedControl value={mode} onChange={setMode}
            options={[{value:'fast',label:'Fastest',icon:<Icon name="zap" size={16} />},{value:'private',label:'Private',icon:<Icon name="shield-check" size={16} />}]} />
        </div>
        <Switch checked={on} onChange={setOn} label="Avoid monitored roads" />
      </Sect>
      <Sect label="Badges">
        <Badge tone="brand" icon={<Icon name="shield-check" size={13} />}>Private</Badge>
        <Badge tone="alert" icon={<Icon name="scan-eye" size={13} />}>3 cameras</Badge>
        <Badge tone="warning" icon={<Icon name="triangle-alert" size={13} />}>Monitored</Badge>
        <Badge tone="info" icon={<Icon name="zap" size={13} />}>Fastest</Badge>
        <Badge tone="neutral">12.4 mi</Badge>
      </Sect>
      <Sect label="Chips">
        <Chip tone="light" selected={sel} onClick={()=>setSel(!sel)} icon={<Icon name="scan-eye" size={15} />}>Cameras</Chip>
        <Chip tone="light" icon={<Icon name="fuel" size={15} />}>Gas</Chip>
        <Chip tone="light" icon={<Icon name="coffee" size={15} />}>Coffee</Chip>
        <Chip tone="light">Avoid tolls</Chip>
      </Sect>
      <Sect label="Cards (lg radius)">
        <div style={{width: 300}}>
          <Card tone="light" interactive>
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:18,marginBottom:4}}>Solid card</div>
            <div style={{color:'var(--text-secondary)',fontSize:14}}>Opaque surface for sheets, panels & docs.</div>
          </Card>
        </div>
        <div style={{width: 300}}>
          <Card tone="glass">
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:18,marginBottom:4}}>Glass card</div>
            <div style={{color:'var(--text-secondary)',fontSize:14}}>Frosted surface that floats over the map.</div>
          </Card>
        </div>
      </Sect>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
