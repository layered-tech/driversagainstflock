            <path d="M128 128 L87.6 17.1 A118 118 0 0 1 168.4 17.1 Z" fill="{{ c.fill }}"></path>
            <path d="M128 128 L87.6 17.1 M168.4 17.1 L128 128" stroke="rgba(255,77,79,0.85)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="{{ c.edgeOpacity }}"></path>
            <path d="M128 128 L128 12" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-dasharray="2 6" fill="none" stroke-linecap="round" opacity="{{ c.edgeOpacity }}"></path>
          </svg>
        </div>
      </sc-for>

      <!-- the node being edited -->
      <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:3;">
        <x-import component-from-global-scope="DesignSystem_aa8750.MapMarker" variant="alpr" hint-size="40px,40px"></x-import>
      </div>

      <div style="position:absolute; inset:0; border-radius:50%; box-shadow:inset 0 2px 10px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.10); pointer-events:none; z-index:4;"></div>
      <div style="position:absolute; left:50%; bottom:11px; transform:translateX(-50%); z-index:5; pointer-events:none; background:rgba(11,14,18,0.78); border:1px solid rgba(255,255,255,0.16); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border-radius:var(--radius-pill); padding:5px 12px; font-family:var(--font-mono); font-size:13px; font-weight:600; letter-spacing:0.02em; color:#fff; white-space:nowrap;">{{ headingLabel }}</div>
    </div>

    <!-- rotating bezel -->
    <div style="position:absolute; inset:0; pointer-events:none;">
      <div style="{{ ringXform }}">
        <svg width="330" height="330" viewBox="0 0 330 330" style="position:absolute; inset:0; display:block;">
          <circle cx="165" cy="165" r="163.5" fill="none" stroke="var(--border)" stroke-width="1"></circle>
          <circle cx="165" cy="165" r="129" fill="none" stroke="var(--border)" stroke-width="1"></circle>
          <path d="{{ minorD }}" stroke="var(--text-tertiary)" stroke-width="1" fill="none" opacity="0.55"></path>
          <path d="{{ majorD }}" stroke="var(--text-primary)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"></path>
        </svg>
        <sc-for list="{{ labels }}" as="l" hint-placeholder-count="4">
          <span style="{{ l.style }}">{{ l.txt }}</span>
        </sc-for>
      </div>
    </div>

    <!-- fixed index notch: read the aim here -->
    <svg width="330" height="330" viewBox="0 0 330 330" style="position:absolute; inset:0; pointer-events:none; display:block;">
      <polygon points="165,27 156.5,7 173.5,7" fill="var(--alert-500)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linejoin="round"></polygon>
    </svg>
  </div>

  <!-- map controls -->
  <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-top:14px;">
    <button type="button" aria-label="Zoom in" onClick="{{ zoomIn }}" style="{{ zoomInStyle }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg></button>
    <button type="button" aria-label="Zoom out" onClick="{{ zoomOut }}" style="{{ zoomOutStyle }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M5 12h14"></path></svg></button>
    <button type="button" aria-label="Re-center on this camera" onClick="{{ recenter }}" style="{{ recenterStyle }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><line x1="2" x2="5" y1="12" y2="12"></line><line x1="19" x2="22" y1="12" y2="12"></line><line x1="12" x2="12" y1="2" y2="5"></line><line x1="12" x2="12" y1="19" y2="22"></line><circle cx="12" cy="12" r="7"></circle><circle cx="12" cy="12" r="1"></circle></svg></button>
  </div>
  <div style="text-align:center; font-family:var(--font-mono); font-size:11px; letter-spacing:0.02em; color:var(--text-tertiary); margin-top:9px;">{{ coordsLabel }}</div>

  <!-- directions on this pole -->
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;">
    <sc-for list="{{ chips }}" as="c" hint-placeholder-count="1">
      <span role="button" onClick="{{ c.onSelect }}" style="{{ c.style }}">{{ c.label }}<button type="button" aria-label="Remove direction" onClick="{{ c.onRemove }}" style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border:none; background:transparent; color:inherit; cursor:pointer; padding:0; -webkit-tap-highlight-color:transparent;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M18 6 6 18"></path><path d="M6 6l12 12"></path></svg></button></span>
    </sc-for>
    <button type="button" aria-label="Add direction" onClick="{{ onAdd }}" style="{{ addStyle }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>Add direction</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:560},&quot;initial&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;250&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Data&quot;},&quot;lat&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:37.7836,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Data&quot;},&quot;lon&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:-122.417,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Data&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const hs = String(props.initial ?? '250').split(',').map((s) => (((parseFloat(s) || 0) % 360) + 360) % 360);
    this.state = { hs, active: hs.length ? 0 : -1, rot: hs.length ? (360 - hs[0]) % 360 : 0, px: 0, py: 0, z: 1, anim: false };
    this._drag = null;
    this._minor = this._ticks(6, 152, 158.5);
    this._major = this._ticks(30, 146, 158.5);
  }
  _ticks(step, r1, r2) {
    let d = '';
    for (let a = 0; a < 360; a += step) {
      const s = Math.sin(a * Math.PI / 180), c = Math.cos(a * Math.PI / 180);
      d += 'M' + (165 + r1 * s).toFixed(1) + ' ' + (165 - r1 * c).toFixed(1) + 'L' + (165 + r2 * s).toFixed(1) + ' ' + (165 - r2 * c).toFixed(1);
    }
    return d;
  }
  _pt(e) {
    const r = this._box.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
    return { a: Math.atan2(dx, -dy) * 180 / Math.PI, d: Math.hypot(dx, dy) };
  }
  _pulse() { clearTimeout(this._t); this.setState({ anim: true }); this._t = setTimeout(() => this.setState({ anim: false }), 420); }
  componentWillUnmount() { clearTimeout(this._t); }
  _spinTo(h) { // nearest rotation putting bearing h under the notch
    const cur = ((this.state.rot % 360) + 360) % 360;
    let d = ((360 - h) % 360) - cur;
    d = ((d + 540) % 360) - 180;
    return this.state.rot + d;
  }
  renderVals() {
    const { hs, active, rot, px, py, z, anim } = this.state;
    const T = anim ? 'transform 380ms cubic-bezier(0.22, 0.8, 0.3, 1)' : 'none';
    const rad = rot * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad);
    const lat0 = parseFloat(this.props.lat ?? '37.7836'), lon0 = parseFloat(this.props.lon ?? '-122.4170');
    const mx = ((-px * cos) - py * sin) / z, my = (px * sin - py * cos) / z;
    const lat = lat0 - my * 0.00000405, lon = lon0 + mx * 0.0000051;
    const WIND = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
    const wind = (h) => WIND[Math.round(h / 22.5) % 16];
    const hd = (h) => Math.round(h) % 360;
    const btn = (on) => ({ width: 46, height: 46, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid var(--border)', background: 'var(--surface-card)', borderRadius: 'var(--radius-sm)', boxShadow: 'var(--shadow-card)', color: 'var(--text-primary)', cursor: 'pointer', padding: 0, WebkitTapHighlightColor: 'transparent', opacity: on ? 1 : 0.35, pointerEvents: on ? 'auto' : 'none' });
    const offC = Math.hypot(px, py) > 1;
    const labels = [];
    for (let a = 0; a < 360; a += 30) {
      const card = { 0: 'N', 90: 'E', 180: 'S', 270: 'W' }[a];
      labels.push({
        txt: card || String(a),
        style: { position: 'absolute', left: 165 + 139 * Math.sin(a * Math.PI / 180), top: 165 - 139 * Math.cos(a * Math.PI / 180), transform: 'translate(-50%, -50%) rotate(' + (-rot) + 'deg)', transition: T, fontFamily: 'var(--font-mono)', fontSize: card ? 14 : 10, fontWeight: card ? 700 : 500, letterSpacing: '0.02em', color: a === 0 ? 'var(--alert-500)' : (card ? 'var(--text-primary)' : 'var(--text-tertiary)'), lineHeight: 1, pointerEvents: 'none' },
      });
    }
    const cones = hs.map((h, i) => ({
      fill: i === active ? 'url(#dafConeHot)' : 'url(#dafConeDim)',
      edgeOpacity: i === active ? 1 : 0,
      style: { position: 'absolute', inset: 0, transform: 'rotate(' + (h + rot) + 'deg)', transition: T, pointerEvents: 'none', opacity: i === active ? 1 : 0.42, zIndex: i === active ? 2 : 1 },
    }));
    const chip = (sel) => ({ display: 'inline-flex', alignItems: 'center', gap: 4, height: 32, padding: '0 4px 0 12px', borderRadius: 'var(--radius-pill)', fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 600, cursor: 'pointer', border: '1px solid ' + (sel ? 'transparent' : 'var(--border)'), background: sel ? 'var(--brand-soft)' : 'var(--surface-card)', color: sel ? 'var(--text-brand)' : 'var(--text-secondary)', WebkitTapHighlightColor: 'transparent' });
    const chips = hs.map((h, i) => ({
      label: hd(h) + '° · ' + wind(h),
      style: chip(i === active),
      onSelect: () => { this.setState({ active: i, rot: this._spinTo(this.state.hs[i]) }); this._pulse(); },
      onRemove: (ev) => {
        ev.stopPropagation();
        this.setState((s) => {
          const list = s.hs.slice(); list.splice(i, 1);
          let a2 = s.active; if (i < a2) a2 -= 1; else if (i === a2) a2 = Math.min(i, list.length - 1);
          return { hs: list, active: a2 };
        }, () => { const s = this.state; if (s.active >= 0) { this.setState({ rot: this._spinTo(s.hs[s.active]) }); this._pulse(); } });
      },
    }));
    return {
      boxRef: (el) => { this._box = el; },
      down: (e) => {
        const p = this._pt(e); if (p.d > 168) return;
        e.preventDefault(); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
        this._drag = p.d > 128 ? { m: 'ring', last: p.a } : { m: 'pan', x: e.clientX, y: e.clientY };
        this.setState({ anim: false });
      },
      move: (e) => {
        const g = this._drag; if (!g) return;
        if (g.m === 'ring') {
          const p = this._pt(e); let d = p.a - g.last; d = ((d + 540) % 360) - 180; g.last = p.a;
          this.setState((s) => {
            const rot2 = s.rot + d, list = s.hs.slice();
            if (s.active >= 0) list[s.active] = (((360 - rot2) % 360) + 360) % 360;
            return { rot: rot2, hs: list };
          });
        } else {
          const dx = e.clientX - g.x, dy = e.clientY - g.y; g.x = e.clientX; g.y = e.clientY;
          this.setState((s) => {
            let x = s.px + dx, y = s.py + dy; const m = Math.hypot(x, y);
            if (m > 150) { x *= 150 / m; y *= 150 / m; }
            return { px: x, py: y };
          });
        }
      },
      up: () => { if (!this._drag) return; this._drag = null; this.setState((s) => ({ rot: ((s.rot % 360) + 360) % 360 })); },
      satXform: { position: 'absolute', inset: 0, transform: 'translate(' + px + 'px, ' + py + 'px) rotate(' + rot + 'deg) scale(' + z + ')', transition: T, willChange: 'transform' },
      ringXform: { position: 'absolute', inset: 0, transform: 'rotate(' + rot + 'deg)', transition: T },
      minorD: this._minor, majorD: this._major,
      labels, cones, chips,
      headingLabel: active >= 0 ? hd(hs[active]) + '° · ' + wind(hs[active]) : 'No direction yet',
      coordsLabel: lat.toFixed(6) + ', ' + lon.toFixed(6),
      onAdd: () => {
        const s0 = this.state;
        const base = s0.active >= 0 ? s0.hs[s0.active] + 180 : 360 - (((s0.rot % 360) + 360) % 360);
        const h = ((base % 360) + 360) % 360;
        this.setState({ hs: s0.hs.concat([h]), active: s0.hs.length, rot: this._spinTo(h) });
        this._pulse();
      },
      zoomIn: () => { this.setState((s) => ({ z: Math.min(2.4, s.z * 1.35) })); this._pulse(); },
      zoomOut: () => { this.setState((s) => ({ z: Math.max(0.72, s.z / 1.35) })); this._pulse(); },
      recenter: () => { this.setState({ px: 0, py: 0 }); this._pulse(); },
      zoomInStyle: btn(z < 2.39),
      zoomOutStyle: btn(z > 0.73),
      recenterStyle: Object.assign(btn(true), { color: offC ? 'var(--text-brand)' : 'var(--text-primary)', borderColor: offC ? 'var(--brand)' : 'var(--border)' }),
      addStyle: { display: 'inline-flex', alignItems: 'center', gap: 6, height: 32, padding: '0 14px', borderRadius: 'var(--radius-pill)', fontFamily: 'var(--font-ui)', fontSize: 13, fontWeight: 600, background: 'transparent', color: 'var(--text-secondary)', border: '1px dashed var(--border-strong)', cursor: 'pointer', WebkitTapHighlightColor: 'transparent' },
    };
  }
}
</script>
